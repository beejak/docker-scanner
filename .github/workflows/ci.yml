name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests (with race detector)
        run: go test -race -count=1 ./pkg/...

      - name: Build all commands
        run: go build ./cmd/...

  integration:
    name: Integration Scan
    runs-on: ubuntu-latest
    # Run on push to main and on PRs that touch scanner/enrichment code.
    if: github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'pkg/scanner') || contains(github.event.pull_request.changed_files, 'pkg/remediate')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.1

      - name: Integration tests
        run: go test -v -timeout 5m ./tests/integration/...
        env:
          TRIVY_NO_PROGRESS: "true"
